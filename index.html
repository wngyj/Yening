<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>叶宁的小屋</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#0a0c0f;
  color:#fff;
}
.container{max-width:1100px;margin:0 auto;padding:2rem}
.hero{text-align:center;padding:4rem 0}
.domain-badge{
  color:#9aaec9;
  letter-spacing:3px;
  border:1px solid rgba(255,255,255,.08);
  padding:.4rem 1.2rem;
  border-radius:999px;
  display:inline-block;
}
.big-number{
  display:flex;
  justify-content:center;
  font-size:clamp(4rem,14vw,9rem);
  font-weight:800;
  margin:2rem 0;
}
.digit{
  background:linear-gradient(145deg,#fff,#b0d0ff);
  -webkit-background-clip:text;
  color:transparent;
}
.subhead{
  color:#cbd5e6;
  font-size:1.2rem;
  margin-top:1rem;
}

.meaning-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:2rem;
  margin-top:4rem;
}
.meaning-card{
  background:rgba(20,25,35,.8);
  border-radius:32px;
  padding:3rem 2rem;
  text-align:center;
}
.card-number{
  font-size:3.5rem;
  font-weight:700;
  color:#cfe3ff;
}
.card-title{
  font-size:1.6rem;
  margin-top:.5rem;
}
.card-desc{
  color:#9aaec9;
  margin-top:.8rem;
  line-height:1.6;
}

/* ===== 项目导航 ===== */
.nav-section{
  margin:5rem 0 3rem;
  text-align:center;
}

.nav-label{
  font-size:.85rem;
  letter-spacing:4px;
  color:#6f86a6;
  margin-bottom:1.2rem;
}

.nav-card{
  display:inline-block;
  padding:2rem 3rem;
  border-radius:28px;
  background:rgba(25,30,40,.8);
  text-decoration:none;
  color:#fff;
}
.nav-card span{
  display:block;
  color:#9aaec9;
  margin-top:.5rem;
}

/* 签名 */
.signature{
  text-align:center;
  margin:4rem 0 2rem;
  color:#9aaec9;
}
.signature strong{
  margin-left:.5rem;
  background:linear-gradient(145deg,#fff,#b0d5ff);
  -webkit-background-clip:text;
  color:transparent;
}

/* ===== 动画补丁 ===== */
.animate-enter{
  opacity:0;
  transform:translateY(14px) scale(.98);
  will-change:transform,opacity;
}
.animate-enter.is-visible{
  opacity:1;
  transform:translateY(0) scale(1);
  transition:
    opacity .8s cubic-bezier(.22,1,.36,1),
    transform .8s cubic-bezier(.22,1,.36,1);
}
@media (hover:hover){
  .animate-enter.is-visible:hover{
    transform:translateY(-2px);
  }
}
</style>
</head>

<body>
<main class="container">

  <section class="hero animate-enter">
    <span class="domain-badge">211816.xyz</span>
    <div class="big-number">
      <span class="digit">2</span>
      <span class="digit">1</span>
      <span class="digit">1</span>
      <span class="digit">8</span>
      <span class="digit">1</span>
      <span class="digit">6</span>
    </div>
    <p class="subhead">每一个数字，都是一段旅程</p>
  </section>

  <section class="meaning-grid">
    <div class="meaning-card animate-enter">
      <div class="card-number">2</div>
      <div class="card-title">双向</div>
      <div class="card-desc">爱与被爱，同时发生</div>
    </div>
    <div class="meaning-card animate-enter">
      <div class="card-number">1</div>
      <div class="card-title">起点</div>
      <div class="card-desc">初心不忘，方得始终</div>
    </div>
    <div class="meaning-card animate-enter">
      <div class="card-number">1</div>
      <div class="card-title">坚持</div>
      <div class="card-desc">久久为功，玉汝于成</div>
    </div>
    <div class="meaning-card animate-enter">
      <div class="card-number">8</div>
      <div class="card-title">无限</div>
      <div class="card-desc">探索未知，永无止境</div>
    </div>
    <div class="meaning-card animate-enter">
      <div class="card-number">1</div>
      <div class="card-title">热爱</div>
      <div class="card-desc">心之所向，素履以往</div>
    </div>
    <div class="meaning-card animate-enter">
      <div class="card-number">6</div>
      <div class="card-title">顺遂</div>
      <div class="card-desc">平安喜乐，万事胜意</div>
    </div>
  </section>

  <section class="nav-section">
    <div class="nav-label animate-enter">项目导航</div>

    <a class="nav-card animate-enter" href="https://qn.211816.xyz" target="_blank">
      千凝
      <span>Android 自动化工具</span>
    </a>
  </section>

  <div class="signature animate-enter">
    Design & Development <strong>叶宁</strong>
  </div>

</main>

<script>
(function(){
  const els=document.querySelectorAll('.animate-enter');
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add('is-visible');
        io.unobserve(e.target);
      }
    });
  },{threshold:.15});
  els.forEach(el=>io.observe(el));
})();
</script>

</body>
</html>
